<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9ecf,#ffd6ec,#c8f1ff);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

.container{
    z-index:2;
    padding:40px;
    border-radius:30px;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.15);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    animation:float 3s ease-in-out infinite;
}

h1{
    font-size:4rem;
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,0.8);
}

p{
    margin-top:15px;
    font-size:1.3rem;
    color:white;
}

button{
    margin-top:25px;
    padding:14px 28px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4fa3;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

button:hover{
    transform:scale(1.08);
}

.balloon{
    position:absolute;
    bottom:-150px;
    width:80px;
    animation:rise linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-130vh);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    background:white;
    opacity:0.8;
    animation:confettiFall linear infinite;
}

@keyframes confettiFall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday 🎂</h1>
    <p>You deserve cake, happiness, and slightly less emotional damage this year 💖</p>

    <button onclick="playMusic()">Click for Surprise ✨</button>
</div>

<audio id="music" loop>
    <source src="https://www.myinstants.com/media/sounds/happy-birthday-to-you.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
    document.getElementById("music").play();

    alert("🎀 Happiest Birthday Beautiful 🎀");
}

// Balloons
for(let i=0;i<15;i++){
    let balloon=document.createElement("img");
    balloon.src="https://cdn-icons-png.flaticon.com/512/3468/3468373.png";

    balloon.classList.add("balloon");

    balloon.style.left=Math.random()*100+"vw";
    balloon.style.animationDuration=(5+Math.random()*5)+"s";
    balloon.style.width=(50+Math.random()*50)+"px";

    document.body.appendChild(balloon);
}

// Confetti
for(let i=0;i<120;i++){
    let conf=document.createElement("div");

    conf.classList.add("confetti");

    conf.style.left=Math.random()*100+"vw";
    conf.style.animationDuration=(3+Math.random()*5)+"s";
    conf.style.background=
        `hsl(${Math.random()*360},100%,70%)`;

    document.body.appendChild(conf);
}
</script>

</body>
</html>
